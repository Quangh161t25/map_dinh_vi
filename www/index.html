<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kiều đức</title>
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="kiều đức">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.25/jsrsasign-all-min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>
    <section id="authScreen" class="auth-screen">
        <form class="login-card" onsubmit="handleLogin(event)">
            <div class="login-logo">KIỀU<br>ĐỨC</div>
            <h1>Đăng nhập</h1>
            <label>
                <span>Tên đăng nhập</span>
                <input id="loginId" type="text" autocomplete="username" required>
            </label>
            <label>
                <span>Mật khẩu</span>
                <input id="loginPassword" type="password" autocomplete="current-password" required>
            </label>
            <label class="remember-row">
                <input id="rememberLogin" type="checkbox" checked>
                <span>Lưu đăng nhập</span>
            </label>
            <p id="loginError" class="login-error"></p>
            <button type="submit" class="primary-btn">Đăng nhập</button>
        </form>
    </section>

    <div class="app-shell" style="display: none;">
        <header class="mobile-header">
            <button type="button" class="icon-btn" onclick="toggleMobileSidebar()" style="background: transparent; border: none; color: white; padding: 4px;">
                <i data-lucide="menu"></i>
            </button>
            <h1 id="mobilePageTitle">Vị trí</h1>
        </header>
        <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleMobileSidebar()"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div class="brand">
                    <div id="brandText" class="logo"><i data-lucide="map-pin" style="color: white; width: 24px; height: 24px;"></i></div>
                    <div class="brand-text-container">
                        <h1 id="pageTitle">Vị trí</h1>
                        <p id="sheetName" class="sheet-name">DASHBOARD</p>
                    </div>
                </div>
                <button type="button" class="icon-btn" id="toggleSidebarBtn" onclick="toggleSidebar()" style="background: transparent; border: none; padding: 4px; cursor: pointer; color: var(--muted);">
                    <i data-lucide="panel-left-close" id="sidebarToggleIcon"></i>
                </button>
            </div>
            <div id="tabs" class="tabs"></div>
            <div id="userPanel" class="user-panel"></div>
        </aside>

        <main class="main-content">
            <div class="header-container">
                <div id="headerActions">
                    <div class="search-container">
                        <i data-lucide="search" class="search-icon" style="width: 18px;"></i>
                        <input type="text" id="searchInput" class="search-input" placeholder="Tìm kiếm nhanh..."
                            oninput="filterTable()">
                    </div>
                    <button id="reloadBtn" type="button" onclick="fetchData()">
                        <i data-lucide="refresh-cw" style="width:18px;"></i> Load lại
                    </button>
                    <button id="uploadBtn" onclick="document.getElementById('fileInput').click()">
                        <i data-lucide="upload" style="width:18px;"></i> Tải dữ liệu lên
                    </button>
                    <button id="addBtn" type="button" onclick="openRecordForm()">
                        <i data-lucide="plus" style="width:18px;"></i> Thêm mới
                    </button>
                    <button id="bulkDeleteBtn" type="button" class="danger-btn" onclick="deleteSelectedRows()" style="display:none">
                        <i data-lucide="trash-2" style="width:18px;"></i> Xóa đã chọn
                    </button>
                    <input type="file" id="fileInput" hidden multiple accept=".xlsx, .xls, .csv" onchange="handleFileUpload(event)">
                </div>
                <div id="filterPanel" class="filter-panel"></div>
            </div>

            <div id="homeContainer" class="home-container" style="display: none; padding: 20px;"></div>

            <div class="table-wrapper" id="tableWrapper">
                <table id="dataTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="kanbanBoard" class="kanban-board"></div>

            <div id="mapContainer" style="display: none; height: calc(100vh - 150px); width: 100%; position: relative; margin-top: 10px;">
                <div id="mapTopBar" class="map-top-bar">
                    <div class="map-control-group">
                        <input type="text" id="searchAddress" placeholder="Nhập địa chỉ..." onkeypress="if(event.key==='Enter') searchMapAddress()">
                        <button type="button" class="icon-btn-small" onclick="searchMapAddress()"><i data-lucide="search"></i></button>
                    </div>
                    <div class="map-control-group">
                        <input type="date" id="historyDate" onchange="loadHistory()">
                    </div>
                </div>

                <div id="mapRightSidebar" class="map-right-sidebar">
                    <button type="button" class="icon-btn-toggle" onclick="toggleMapSidebar()" id="toggleMapSidebarBtn"><i data-lucide="chevron-right"></i></button>
                    <div class="map-sidebar-content" id="mapSidebarContent">
                        <button id="toggleTrackingBtn" type="button" class="map-icon-btn tracking-btn" onclick="toggleTracking()" title="Bắt đầu Định vị"><i data-lucide="navigation"></i></button>
                        <button type="button" class="map-icon-btn camera-btn" onclick="triggerCamera()" title="Chụp ảnh"><i data-lucide="camera"></i></button>
                        <button type="button" class="map-icon-btn" onclick="loadHistory()" title="Xem lịch sử"><i data-lucide="clock"></i></button>
                        <button type="button" class="map-icon-btn" onclick="loadOthersLocations()" title="Vị trí mọi người"><i data-lucide="users"></i></button>
                        <button type="button" class="map-icon-btn" onclick="viewPhotos()" title="Xem ảnh"><i data-lucide="image"></i></button>
                    </div>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handleCameraUpload(event)">
                    <input type="file" id="mapMarkerPhotoInput" accept="image/*" style="display: none;" onchange="handleMapMarkerPhotoUpload(event)">
                </div>
                <div id="map" style="height: 100%; width: 100%; border-radius: 8px;"></div>
            </div>

            <div id="pagination" class="pagination"></div>
        </main>
    </div>

    <div class="modal-mask" id="productModal">
        <form class="modal" onsubmit="saveRecordFromForm(event)">
            <div class="modal-header">
                <h2 id="productModalTitle">Thêm mới</h2>
                <button type="button" class="icon-btn" onclick="closeProductForm()" title="Đóng">
                    <i data-lucide="x" style="width:18px;"></i>
                </button>
            </div>
            <input type="hidden" id="editingSheetRow">
            <div id="formFields" class="form-fields"></div>
            <div class="modal-actions">
                <button id="deleteBtn" type="button" class="danger-btn" onclick="deleteCurrentRecord()">
                    <i data-lucide="trash-2" style="width:16px;"></i> Xóa
                </button>
                <div class="modal-actions-right">
                    <button type="button" class="secondary-btn" onclick="closeProductForm()">Hủy</button>
                    <button type="submit" class="primary-btn">Lưu</button>
                </div>
            </div>
        </form>
    </div>

    <script src="app.js?v=19"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js").catch(() => {});
            });
        }
    </script>
</body>

</html>
