<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kiều đức</title>
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="kiều đức">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.25/jsrsasign-all-min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>
    <section id="authScreen" class="auth-screen">
        <form class="login-card" onsubmit="handleLogin(event)">
            <div class="login-logo">KIỀU<br>ĐỨC</div>
            <h1>Đăng nhập</h1>
            <label>
                <span>Tên đăng nhập</span>
                <input id="loginId" type="text" autocomplete="username" required>
            </label>
            <label>
                <span>Mật khẩu</span>
                <input id="loginPassword" type="password" autocomplete="current-password" required>
            </label>
            <label class="remember-row">
                <input id="rememberLogin" type="checkbox" checked>
                <span>Lưu đăng nhập</span>
            </label>
            <p id="loginError" class="login-error"></p>
            <button type="submit" class="primary-btn">Đăng nhập</button>
        </form>
    </section>

    <div class="app-shell" style="display: none;">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <div id="brandText" class="logo">KIỀU<br>ĐỨC</div>
                    <div>
                        <h1 id="pageTitle">kiều đức</h1>
                        <p id="sheetName" class="sheet-name">DASHBOARD</p>
                    </div>
                </div>
            </div>
            <div id="userPanel" class="user-panel"></div>
            <div id="tabs" class="tabs"></div>
        </aside>

        <main class="main-content">
            <div class="header-container">
                <div id="headerActions">
                    <div class="search-container">
                        <i data-lucide="search" class="search-icon" style="width: 18px;"></i>
                        <input type="text" id="searchInput" class="search-input" placeholder="Tìm kiếm nhanh..."
                            oninput="filterTable()">
                    </div>
                    <button id="reloadBtn" type="button" onclick="fetchData()">
                        <i data-lucide="refresh-cw" style="width:18px;"></i> Load lại
                    </button>
                    <button id="uploadBtn" onclick="document.getElementById('fileInput').click()">
                        <i data-lucide="upload" style="width:18px;"></i> Tải dữ liệu lên
                    </button>
                    <button id="addBtn" type="button" onclick="openRecordForm()">
                        <i data-lucide="plus" style="width:18px;"></i> Thêm mới
                    </button>
                    <button id="bulkDeleteBtn" type="button" class="danger-btn" onclick="deleteSelectedRows()" style="display:none">
                        <i data-lucide="trash-2" style="width:18px;"></i> Xóa đã chọn
                    </button>
                    <input type="file" id="fileInput" hidden multiple accept=".xlsx, .xls, .csv" onchange="handleFileUpload(event)">
                </div>
                <div id="filterPanel" class="filter-panel"></div>
            </div>

            <div class="table-wrapper" id="tableWrapper">
                <table id="dataTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="kanbanBoard" class="kanban-board"></div>

            <div id="mapContainer" style="display: none; height: calc(100vh - 150px); width: 100%; position: relative; margin-top: 10px;">
                <div style="padding: 10px; display: flex; flex-wrap: wrap; gap: 10px; background: #fff; z-index: 1000; position: absolute; top: 10px; left: 60px; border-radius: 4px; box-shadow: 0 1px 5px rgba(0,0,0,0.2); max-width: calc(100% - 70px);">
                    <button id="toggleTrackingBtn" type="button" class="primary-btn" onclick="toggleTracking()">Bắt đầu Định vị</button>
                    <input type="date" id="historyDate" onchange="loadHistory()" style="padding: 5px; border-radius: 4px; border: 1px solid #ddd;">
                    <button type="button" class="secondary-btn" onclick="loadHistory()">Xem lịch sử</button>
                    <input type="text" id="searchAddress" placeholder="Nhập địa chỉ..." style="padding: 5px; border-radius: 4px; border: 1px solid #ddd; min-width: 200px;" onkeypress="if(event.key==='Enter') searchMapAddress()">
                    <button type="button" class="secondary-btn" onclick="searchMapAddress()">Tìm</button>
                    <button type="button" class="secondary-btn" onclick="loadOthersLocations()">Tải lại vị trí mọi người</button>
                    <button type="button" class="primary-btn" onclick="triggerCamera()" style="background-color: #10b981;">📷 Chụp ảnh</button>
                    <button type="button" class="secondary-btn" onclick="viewPhotos()">🖼️ Xem ảnh</button>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handleCameraUpload(event)">
                </div>
                <div id="map" style="height: 100%; width: 100%; border-radius: 8px;"></div>
            </div>

            <div id="pagination" class="pagination"></div>
        </main>
    </div>

    <div class="modal-mask" id="productModal">
        <form class="modal" onsubmit="saveRecordFromForm(event)">
            <div class="modal-header">
                <h2 id="productModalTitle">Thêm mới</h2>
                <button type="button" class="icon-btn" onclick="closeProductForm()" title="Đóng">
                    <i data-lucide="x" style="width:18px;"></i>
                </button>
            </div>
            <input type="hidden" id="editingSheetRow">
            <div id="formFields" class="form-fields"></div>
            <div class="modal-actions">
                <button id="deleteBtn" type="button" class="danger-btn" onclick="deleteCurrentRecord()">
                    <i data-lucide="trash-2" style="width:16px;"></i> Xóa
                </button>
                <div class="modal-actions-right">
                    <button type="button" class="secondary-btn" onclick="closeProductForm()">Hủy</button>
                    <button type="submit" class="primary-btn">Lưu</button>
                </div>
            </div>
        </form>
    </div>

    <script src="app.js?v=10"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js").catch(() => {});
            });
        }
    </script>
</body>

</html>
